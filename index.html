<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Form</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gradient-to-r from-blue-100 to-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center text-gray-800">Register</h2>
<p class="text-center text-gray-500 mb-6">Create your account</p>

<form id="registerForm" class="space-y-5">

<!-- Name -->
<div>
<label class="text-gray-600 text-sm">Name</label>
<div class="flex items-center border rounded-lg px-3 mt-1">
<i class="fa fa-user text-gray-400"></i>
<input type="text" id="name" placeholder="Enter your name"
class="w-full p-2 outline-none ml-2">
</div>
</div>

<!-- Email -->
<div>
<label class="text-gray-600 text-sm">Email</label>
<div class="flex items-center border rounded-lg px-3 mt-1">
<i class="fa fa-envelope text-gray-400"></i>
<input type="email" id="email" placeholder="Enter your email"
class="w-full p-2 outline-none ml-2">
</div>
</div>

<!-- Password -->
<div>
<label class="text-gray-600 text-sm">Password</label>
<div class="flex items-center border rounded-lg px-3 mt-1">
<i class="fa fa-lock text-gray-400"></i>
<input type="password" id="password" placeholder="Min. 6 characters"
class="w-full p-2 outline-none ml-2">

<button type="button" onclick="togglePassword()">
<i class="fa fa-eye text-gray-400"></i>
</button>
</div>
</div>

<!-- Button -->
<button type="submit"
class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-2 rounded-lg font-semibold hover:opacity-90">
Create Account
</button>

<p id="message" class="text-center text-sm mt-2"></p>

<p class="text-center text-sm text-gray-500 mt-4">
Already have an account? <a href="#" class="text-blue-500">Login</a>
</p>

</form>

</div>

<script>

function togglePassword(){
let password=document.getElementById("password");

if(password.type==="password"){
password.type="text";
}else{
password.type="password";
}
}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let message=document.getElementById("message");

if(password.length<6){
message.innerHTML="Password must be at least 6 characters";
message.className="text-red-500 text-center";
return;
}

message.innerHTML="Account Created Successfully!";
message.className="text-green-500 text-center";

});

</script>

</body>
</html>
